name: NOAA Twitter Bot

on:
  schedule:
    - cron: '7 11 * * *'   # 07:00 EDT (summer, UTC-4)
    - cron: '7 12 * * *'   # 07:00 EST (winter, UTC-5)
  workflow_dispatch:

permissions:
  contents: write  # needed to commit the activity log

jobs:
  gate:
    runs-on: ubuntu-latest
    outputs:
      run: ${{ steps.check.outputs.run }}
    steps:
      - name: Decide whether this trigger maps to 7 AM Eastern
        id: check
        run: |
          offset=$(TZ=America/New_York date +%z)   # -0400 in EDT, -0500 in EST
          schedule="${{ github.event.schedule }}"  # empty for manual runs
          run=yes
          if [ -n "$schedule" ]; then
            run=no
            if [ "$offset" = "-0400" ] && [ "$schedule" = "7 11 * * *" ]; then
              run=yes
            fi
            if [ "$offset" = "-0500" ] && [ "$schedule" = "7 12 * * *" ]; then
              run=yes
            fi
          fi
          echo "run=$run" >> "$GITHUB_OUTPUT"

  tweet-noaa-data:
    needs: gate
    if: needs.gate.outputs.run == 'yes'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests requests-oauthlib

      - name: Run NOAA Twitter bot
        env:
          CONSUMER_KEY: ${{ secrets.CONSUMER_KEY }}
          CONSUMER_SECRET: ${{ secrets.CONSUMER_SECRET }}
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          ACCESS_TOKEN_SECRET: ${{ secrets.ACCESS_TOKEN_SECRET }}
        run: python main.py | tee run-output.txt

      - name: Append run to activity log
        run: |
          mkdir -p data
          {
            echo "$(date -u +%Y-%m-%dT%H:%M:%SZ) - run completed"
            tail -n 20 run-output.txt
            echo "---"
          } >> data/run-log.txt

      - name: Commit log update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/run-log.txt
          git diff --staged --quiet || git commit -m "Log: NOAA bot run $(date -u +%Y-%m-%d)"
          git pull --rebase origin main
          git push
