name: NOAA Twitter Bot

on:
  schedule:
    # Both crons fire ~13 min early (06:47 ET) on an off-peak minute to absorb
    # GitHub's best-effort scheduling delay (it fires late, never early, and is
    # worst at the top of the hour). The gate below kills the wrong one for the
    # current DST state, and the "Wait until 07:00 Eastern" step sleeps until the
    # exact target time before posting.
    - cron: '47 10 * * *'   # 06:47 EDT (summer, UTC-4) -> 10:47 UTC
    - cron: '47 11 * * *'   # 06:47 EST (winter, UTC-5) -> 11:47 UTC
  workflow_dispatch:

permissions:
  contents: write  # needed to commit the activity log

jobs:
  gate:
    runs-on: ubuntu-latest
    outputs:
      run: ${{ steps.check.outputs.run }}
    steps:
      - name: Decide whether this trigger maps to 7 AM Eastern
        id: check
        run: |
          # Both crons fire every day. This gate lets through exactly the one
          # that corresponds to 7 AM Eastern today, and skips the other.
          #
          # It keys off the SCHEDULED cron hour (not the wall clock), so a
          # GitHub-delayed run that executes after the hour boundary is still
          # judged correctly. And it only reads the hour field out of the cron
          # string, so it can't silently fail-closed if the full cron literal
          # ever drifts.
          #
          #   7 AM EDT (offset -0400): 06:47 ET == 10:47 UTC -> cron hour 10
          #   7 AM EST (offset -0500): 06:47 ET == 11:47 UTC -> cron hour 11
          schedule="${{ github.event.schedule }}"   # empty for manual runs
          if [ -z "$schedule" ]; then
            run=yes
          else
            cron_hour=$(echo "$schedule" | awk '{print $2}')
            offset=$(TZ=America/New_York date +%z)
            case "$offset" in
              -0400) want=10 ;;
              -0500) want=11 ;;
              *)     want="" ;;
            esac
            if [ "$cron_hour" = "$want" ]; then run=yes; else run=no; fi
          fi
          echo "run=$run" >> "$GITHUB_OUTPUT"

  tweet-noaa-data:
    needs: gate
    if: needs.gate.outputs.run == 'yes'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests requests-oauthlib

      - name: Wait until 07:00 Eastern
        # Scheduled runs fire ~13 min early, then sleep to the exact target so
        # the post lands within a few seconds of 07:00:00 ET. ZoneInfo keeps the
        # target DST-correct. Manual (workflow_dispatch) runs skip the wait and
        # post immediately. If GitHub is delayed past 07:00, now >= target and
        # the sleep is a no-op (posts as soon as the runner picks it up).
        if: github.event_name == 'schedule'
        run: |
          python3 - <<'PY'
          import time
          from datetime import datetime
          from zoneinfo import ZoneInfo
          now = datetime.now(ZoneInfo("America/New_York"))
          target = now.replace(hour=7, minute=0, second=0, microsecond=0)
          if now < target:
              time.sleep((target - now).total_seconds())
          PY

      - name: Run NOAA Twitter bot
        env:
          CONSUMER_KEY: ${{ secrets.CONSUMER_KEY }}
          CONSUMER_SECRET: ${{ secrets.CONSUMER_SECRET }}
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          ACCESS_TOKEN_SECRET: ${{ secrets.ACCESS_TOKEN_SECRET }}
        run: python main.py | tee run-output.txt

      - name: Append run to activity log
        run: |
          mkdir -p data
          {
            echo "$(date -u +%Y-%m-%dT%H:%M:%SZ) - run completed"
            tail -n 20 run-output.txt
            echo "---"
          } >> data/run-log.txt

      - name: Commit log update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/run-log.txt
          git diff --staged --quiet || git commit -m "Log: NOAA bot run $(date -u +%Y-%m-%d)"
          git pull --rebase origin main
          git push
